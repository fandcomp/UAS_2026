[pytest]
# pytest.ini - Konfigurasi pytest untuk proyek otomasi DamnCRUD

# Direktori test
testpaths = .

# Pola file test
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Opsi default saat menjalankan pytest
addopts =
    --verbose
    --tb=short
    --html=../reports/hasil_pengujian.html

# Marker kustom
markers =
    fungsional: Pengujian fungsional aplikasi
    keamanan:   Pengujian keamanan (security testing)
    login:      Test terkait autentikasi
    crud:       Test terkait operasi CRUD
    slow:       Test yang membutuhkan waktu lebih lama
